<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12-Graphics</title>
    <link rel="stylesheet" href="../src/css/master.css" />
    <style>
      section svg,
      section canvas {
        display: flex;
        margin-inline: auto;
        margin-bottom: 2rem;
        margin-top: 2rem;
      }

      section h3 {
        text-align: center;
      }
    </style>
  </head>
  <body class="html">
    <a href="index.html" class="btn-home">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="32"
        height="32"
        fill="#000000"
        viewBox="0 0 256 256"
      >
        <path
          d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm48-88a8,8,0,0,1-8,8H107.31l18.35,18.34a8,8,0,0,1-11.32,11.32l-32-32a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,11.32L107.31,120H168A8,8,0,0,1,176,128Z"
        ></path>
      </svg>
    </a>
    <main>
      <header class="mainmenu">
        <h1>12-Graphics</h1>
        <h4>Creates inline graphics with tags</h4>
      </header>
      <section>
        <h3>Canvas:</h3>
        <canvas id="circulo" width="200" height="200"></canvas>

        <h3>SVG:</h3>
        <svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
          <circle
            cx="100"
            cy="100"
            r="80"
            fill="#FF6B35"
            stroke="#E64A19"
            stroke-width="3"
          />
          <text
            x="100"
            y="110"
            font-family="Arial, sans-serif"
            font-size="28"
            fill="white"
            text-anchor="middle"
            font-weight="bold"
          >
            ADSO
          </text>
        </svg>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("circulo");
      const ctx = canvas.getContext("2d");
      const cx = 100,
        cy = 100,
        radio = 80;

      ctx.beginPath();
      ctx.arc(cx, cy, radio, 0, 2 * Math.PI);
      ctx.fillStyle = "#FF6B35";
      ctx.fill();
      ctx.strokeStyle = "#E64A19";
      ctx.lineWidth = 3;
      ctx.stroke();
    </script>
  </body>
</html>
